name: 绿申通 Android APK 最终构建

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 升级pip和安装工具链
      run: |
        pip install --upgrade pip
        pip install buildozer cython -i https://pypi.tuna.tsinghua.edu.cn/simple/
        sudo apt-get update
        sudo apt-get install -y android-sdk android-sdk-platform-tools
    
    - name: 安装项目依赖
      run: |
        cd green-food-app
        pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple/
    
    - name: 构建APK
      run: |
        cd green-food-app
        buildozer android debug
      timeout-minutes: 60
    
    - name: 上传APK产物
      uses: actions/upload-artifact@v4
      with:
        name: greenshentong-apk
        path: green-food-app/bin/*.apk