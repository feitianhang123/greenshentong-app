version: '3.8'

services:
  # 开发环境 - 用于测试应用
  dev:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    working_dir: /app
    command: python main.py
    environment:
      - FLASK_ENV=development

  # 构建环境 - 用于打包APK
  builder:
    build: .
    volumes:
      - ./bin:/app/bin
    working_dir: /app
    command: buildozer android debug

  # 仅提取APK文件
  apk-extractor:
    build:
      context: .
      target: final
    volumes:
      - ./bin:/output
    working_dir: /output