name: 绿申通 Android 构建

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Docker构建x
      uses: docker/setup-buildx-action@v2
    
    - name: 登录Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: 构建Docker镜像
      run: |
        docker build -t greenshentong-builder .
    
    - name: 运行测试
      run: |
        docker run --rm greenshentong-builder python -m pytest tests/ -v
    
    - name: 构建APK
      run: |
        docker run --rm -v "$(pwd)/bin:/app/bin" greenshentong-builder buildozer android debug
    
    - name: 上传APK产物
      uses: actions/upload-artifact@v4
      with:
        name: greenshentong-apk
        path: bin/*.apk
    
    - name: 发布到GitHub Releases
      if: success() && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        body: "绿申通 Android APK 自动构建"
    
    - name: 发送通知
      if: always()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_TITLE: "绿申通构建完成"
        SLACK_MESSAGE: "构建状态: ${{ job.status }}"